<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Draft</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <!---GLOW SA BGD-->
    <div class="bgd-shapes">
        <div class="circle1"></div>
        <div class="circle2"></div>
        <div class="circle3"></div>
    </div>

    <!-- HEADERRR-------------------->
    <header>
        <div class="header">
            <div class="logo">
                <a href="#">NOT A TRAP</a>
            </div>

            <nav class="nav">
                <ul>
                    <li><a href="#HOME" class="active">Home</a></li>
                    <li><a href="#ABOUT">About</a></li>
                    <li><a href="#FEATURES">Features</a></li>
                    <li><a href="#GALLERY">Gallery</a></li>
                    <li><a href="#DEVELOPERS">Developers</a></li>
                </ul>
                <div class="nav-pill"></div>
            </nav>
        </div>
    </header>

    <main>
        <div class="hero-section" id="HOME">
            <div class="images">
                <img src="image_s/main_tile.png" alt="char" class="main-tile">
                <img src="image_s/main_saw.png" alt="char" class="main-saw">
                <img src="image_s/main_char.png" alt="char" class="main-char">
            </div>

            <div class="hero-text">
                <p class="game-title-r">NOT A TRAP</p>
                <div class="title-shadow"></div>
                <p class="game-title-l">NOT A TRAP</p>
                <p class="tagline">LEVEL DEVIL-INSPIRED GAME BY UNEPT</p>

                <div class="play-button">
                    <p><a href="#">PLAY NOW</a></p>
                </div>
            </div>

            <div class="lines">
                <div class="line_1"></div>
                <div class="line_2"></div>
            </div>

            <div class="floating_objects">
                <div class="glow-1"></div>
                <div class="glow-2"></div>
                <div class="glow-3"></div>
                <div class="glow-4"></div>
                <img src="image_s/main_tile.png" alt="tile" class="float-1">
                <img src="image_s/main_tile.png" alt="tile" class="float-2">
                <img src="image_s/main_tile.png" alt="tile" class="float-3">
                <img src="image_s/main_saw.png" alt="tile" class="float-4">
            </div>
        </div>
        
        <!-- ABOUT THE GAME------------------------------------------- -->
         <section class="about" id="#ABOUT">
            <div class="outer-container">
                <div class="inner-container">

                </div>
            </div>


         </section>
    </main>



<script src="javascript.js"></script>

</body>
